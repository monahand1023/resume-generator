[build]
# Build command for React app
command = "npm run build"
# Directory to publish (React build output)
publish = "build"

[build.environment]
# Node version for build
NODE_VERSION = "18"

# IMPORTANT: Replace YOUR_BACKEND_URL with your deployed backend URL before
# deploying to Netlify. The backend must be hosted separately (e.g. Railway,
# Render, Fly.io, a VPS). Netlify cannot host the Express backend itself.
# Example: https://my-resume-backend.fly.dev
[[redirects]]
  from = "/api/*"
  to = "https://YOUR_BACKEND_URL/api/:splat"
  status = 200
  force = true

# Handle React Router (if you add routing later)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
